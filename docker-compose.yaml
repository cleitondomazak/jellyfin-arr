x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment:
    PUID: ${PUID}
    PGID: ${PGID}
    TZ: ${TZ}
  dns:
    - 8.8.8.8
    - 1.1.1.1

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.trustedIPs=172.18.0.0/16"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    volumes:
      - /docker/cloudflared:/etc/cloudflared

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    shm_size: "256mb"
    cap_add:
      - NET_ADMIN
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "81:80/tcp"
    environment:
      TZ: ${TZ}
      WEBPASSWORD: ${PIHOLE_PASSWORD}
      FTLCONF_dns_upstreams: "8.8.8.8;8.8.4.4;1.1.1.3;9.9.9.9"
      FTLCONF_dns_listeningMode: "ALL"
      FTLCONF_dns_ratelimit: 10000
      BLOCKLISTS_URL: "https://gitlab.com/hagezi/mirror/-/raw/main/dns-blocklists/adblock/multi.txt,https://gitlab.com/hagezi/mirror/-/raw/main/dns-blocklists/adblock/popupads.txt,https://gitlab.com/hagezi/mirror/-/raw/main/dns-blocklists/adblock/tif.txt,https://gitlab.com/hagezi/mirror/-/raw/main/dns-blocklists/adblock/fake.txt"
      FTLCONF_dns_specialDomains_iCloudPrivateRelay: "true"
    volumes:
      - /docker/appdata/pihole/etc-pihole:/etc/pihole
      - /docker/appdata/pihole/etc-dnsmasq.d:/etc/dnsmasq.d

  # ─── ARR STACK ─────────────────────────────────

  radarr:
    <<: *common-keys
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/radarr:/config
      - /data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`movie.domazak.net`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  sonarr:
    <<: *common-keys
    image: ghcr.io/hotio/sonarr:latest
    container_name: sonarr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/sonarr:/config
      - /data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`tv.domazak.net`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  bazarr:
    <<: *common-keys
    image: ghcr.io/hotio/bazarr:latest
    container_name: bazarr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/bazarr:/config
      - /data/media:/data/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`subs.domazak.net`)"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  lidarr:
    <<: *common-keys
    image: ghcr.io/hotio/lidarr:latest
    container_name: lidarr
    ports:
      - "8686:8686"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/lidarr:/config
      - /data:/data

  prowlarr:
    <<: *common-keys
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/prowlarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`index.domazak.net`)"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  qbittorrent:
    <<: *common-keys
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/qbittorrent:/config
      - /data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`torrent.domazak.net`)"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

  flaresolverr:
    <<: *common-keys
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"

  # ─── MEDIA ─────────────────────────────────────

  seerr:
    <<: *common-keys
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    volumes:
      - /docker/appdata/seerr:/app/config
    ports:
      - "5055:5055"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`media.domazak.net`)"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"

  maintainerr:
    <<: *common-keys
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    user: "1000:1000"
    volumes:
      - /docker/appdata/maintainerr:/opt/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maintainerr.rule=Host(`clean.domazak.net`)"
      - "traefik.http.services.maintainerr.loadbalancer.server.port=6246"


  shelfarr:
    <<: *common-keys
    image: ghcr.io/pedro-revez-silva/shelfarr:latest
    container_name: shelfarr
    volumes:
      - /docker/appdata/shelfarr/data:/rails/storage
      - /data/media/ebooks:/ebooks
      - /data:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      SOLID_QUEUE_IN_PUMA: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shelfarr.rule=Host(`books.domazak.net`)"
      - "traefik.http.services.shelfarr.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: arr_network